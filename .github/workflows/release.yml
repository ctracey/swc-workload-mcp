name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Bump version in swc_workload_mcp/_version.py
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          python <<'PY'
          import os, re, pathlib
          path = pathlib.Path("swc_workload_mcp/_version.py")
          text = path.read_text()
          m = re.search(r'__version__\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text)
          if not m:
              raise SystemExit("could not parse __version__")
          major, minor, patch = map(int, m.groups())
          bump = os.environ["BUMP"]
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new = f"{major}.{minor}.{patch}"
          path.write_text(f'__version__ = "{new}"\n')
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new}\n")
          PY

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add swc_workload_mcp/_version.py
          git commit -m "Release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
